openapi: 3.0.0
info:
  title: Sample API
  version: 1.0.0
servers:
  - url: https://api.example.com
paths:
  /users:
    get:
      operationId: list_users
      tags: [users]
      summary: List users
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
  /users/{user_id}:
    get:
      operationId: get_user
      tags: [users]
      summary: Get user
      parameters:
        - in: path
          name: user_id
          required: true
          schema:
            type: string
